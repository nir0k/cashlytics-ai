name: Release & Deploy

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      released: ${{ steps.version.outputs.released }}
      is_dev: ${{ steps.version.outputs.is_dev }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run Semantic Release
        id: semantic
        if: github.ref_name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release

          # Get the new version if released
          if [ -f "VERSION" ]; then
            echo "version=$(cat VERSION)" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
          else
            # No release happened, use current version
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.ref_name }}" = "dev" ]; then
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version=${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
            echo "is_dev=true" >> $GITHUB_OUTPUT
          elif [ "${{ steps.semantic.outputs.released }}" = "true" ]; then
            echo "version=${{ steps.semantic.outputs.version }}" >> $GITHUB_OUTPUT
            echo "released=true" >> $GITHUB_OUTPUT
            echo "is_dev=false" >> $GITHUB_OUTPUT
          else
            # Get version from package.json or use default
            CURRENT_VERSION=$(node -p "require('./package.json').version" 2>/dev/null || echo "0.1.0")
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "released=false" >> $GITHUB_OUTPUT
            echo "is_dev=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload version.ts
        if: github.ref_name == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: version-file
          path: src/lib/version.ts

  build-and-push-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.is_dev == 'true' && github.sha || needs.release.outputs.released == 'true' && 'main' || github.sha }}

      - name: Download version.ts
        if: needs.release.outputs.is_dev == 'false'
        uses: actions/download-artifact@v4
        with:
          name: version-file
          path: src/lib/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: docker-tags
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          REPO="ghcr.io/${{ github.repository }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"

          if [ "${{ needs.release.outputs.is_dev }}" = "true" ]; then
            DISPLAY_VERSION="dev-${VERSION}"
            TAGS="${REPO}:dev-${VERSION},${REPO}:dev-latest,${REPO}:dev-${SHORT_SHA}"
          else
            DISPLAY_VERSION="v${VERSION}"
            TAGS="${REPO}:v${VERSION},${REPO}:latest,${REPO}:${SHORT_SHA}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "display_version=${DISPLAY_VERSION}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.docker-tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "### Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.docker-tags.outputs.display_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image:** \`ghcr.io/${{ github.repository }}:${{ steps.docker-tags.outputs.display_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Released:** ${{ needs.release.outputs.released }}" >> $GITHUB_STEP_SUMMARY
