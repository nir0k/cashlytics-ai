# Cashlytics Self-Hosting Docker Compose
#
# Quick Start:
# 1. Copy .env.example to .env
# 2. Edit .env and set your secure passwords
# 3. Run: docker compose -f docker-compose.selfhost.yml up -d
# 4. Open http://localhost:3000

services:
  cashlytics:
    image: ghcr.io/aaronjoeldev/cashlytics-ai:latest
    container_name: cashlytics-app
    ports:
      - "3000:3000"
    environment:
      # Database connection (internal docker network)
      - DATABASE_URL=postgresql://cashlytics:${POSTGRES_PASSWORD}@postgres:5432/cashlytics
      # Public URL of your Cashlytics instance
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      # Default locale (de or en)
      - NEXT_PUBLIC_DEFAULT_LOCALE=${NEXT_PUBLIC_DEFAULT_LOCALE:-de}
      # Default currency (EUR, USD, GBP, CHF)
      - NEXT_PUBLIC_DEFAULT_CURRENCY=${NEXT_PUBLIC_DEFAULT_CURRENCY:-EUR}
      # Auth.js secret for JWT encryption (generate with: npx auth secret)
      - AUTH_SECRET=${AUTH_SECRET}
      # Required when accessing via IP address or custom domain (not localhost)
      - AUTH_TRUST_HOST=${AUTH_TRUST_HOST:-true}
      # Registration mode: true = single user, false = open registration
      - SINGLE_USER_MODE=${SINGLE_USER_MODE:-true}
      # Email of the single user (used for data migration)
      - SINGLE_USER_EMAIL=${SINGLE_USER_EMAIL}
      # OpenAI API Key for AI Assistant (optional)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Push Notifications (generate keys: npx web-push generate-vapid-keys)
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      # Secret token for cron job authentication (generate: openssl rand -hex 32)
      - CRON_SECRET=${CRON_SECRET:-}
      # Email configuration (optional, for password reset emails)
      # Set EMAIL_TRANSPORT=sendmail to use local Postfix, or configure SMTP
      - EMAIL_TRANSPORT=${EMAIL_TRANSPORT:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - APP_URL=${APP_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cashlytics-cron:
    image: alpine:3.20
    restart: unless-stopped
    environment:
      CRON_SECRET: ${CRON_SECRET}
      APP_URL: http://cashlytics:3000
      # Cron-Zeitplan für Zahlungserinnerungen (Standard: 08:00 UTC = 09:00 MEZ / 10:00 MESZ)
      # Format: "Minute Stunde * * *" — z.B. "0 7 * * *" für 07:00 UTC
      NOTIFICATION_SCHEDULE: ${NOTIFICATION_SCHEDULE:-0 8 * * *}
    depends_on:
      cashlytics:
        condition: service_healthy
    command: >
      sh -c "apk add --no-cache curl --quiet &&
             echo \"$$NOTIFICATION_SCHEDULE curl -s -H 'Authorization: Bearer $$CRON_SECRET' $$APP_URL/api/cron/upcoming-payments >> /var/log/cron.log 2>&1\" | crontab - &&
             crond -f -l 2"

  postgres:
    image: postgres:16-alpine
    container_name: cashlytics-postgres
    environment:
      - POSTGRES_USER=cashlytics
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=cashlytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashlytics -d cashlytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Uncomment to expose PostgreSQL port (not recommended for production)
    # ports:
    #   - "5432:5432"

volumes:
  postgres_data:
    driver: local
